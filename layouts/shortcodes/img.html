<div class="custom-img-container" style="text-align: center; margin: 2rem 0; width: 100%;">
  <img src="{{ .Get "src" | absURL }}"
       alt="{{ .Get "caption" | default "image" }}"
       style="width: {{ .Get "w" | default "60%" }};
              max-width: {{ .Get "mw" | default "800px" }};
              height: auto;
              border-radius: 8px;
              display: block;
              margin: 0 auto;
              box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

  {{ if .Get "caption" }}
    <p style="margin-top: 10px; font-size: 0.9rem; color: #666;">
      {{ .Get "caption" }}
    </p>
  {{ end }}
</div>
